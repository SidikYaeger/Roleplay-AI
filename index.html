<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether — AI Roleplay</title>
  <meta name="description" content="Masuki dunia fantasi tak terbatas. Ciptakan karakter AI, bangun persona Anda, dan mulai petualangan roleplay yang mendalam bersama kecerdasan buatan.">
  <meta name="theme-color" content="#080810">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-animated" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <canvas id="stars-canvas"></canvas>
  </div>

  <!-- App Root -->
  <div id="app">
    <div class="page-loading">
      <div class="loading-rune">✦</div>
      <p>Memuat dunia...</p>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card modal-card-sm">
      <div class="modal-header">
        <div class="modal-icon" id="confirm-icon">⚠️</div>
        <h2 class="modal-title" id="confirm-title">Konfirmasi</h2>
        <p class="modal-subtitle" id="confirm-message">Apakah Anda yakin?</p>
      </div>
      <div class="modal-footer">
        <button id="confirm-cancel-btn" class="btn btn-ghost">Batal</button>
        <button id="confirm-ok-btn" class="btn btn-danger">Hapus</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Scripts (order matters) -->
  <script src="config.js?v=2"></script>
  <script src="core/storage.js?v=2"></script>
  <script src="core/api.js?v=2"></script>
  <script src="core/promptBuilder.js?v=2"></script>
  <script src="pages/home.js?v=2"></script>
  <script src="pages/character.js?v=2"></script>
  <script src="pages/persona.js?v=2"></script>
  <script src="pages/chat.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
